<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Gurudév — text písně</title>
<link rel="icon" href="Gurudev_Album.png">
<link rel="apple-touch-icon" href="Gurudev_Album.png">
<meta property="og:title" content="Gurudév">
<meta property="og:description" content="Bhadžan s českým překladem">
<meta property="og:image" content="Gurudev_Album.png">
<meta property="og:type" content="music.song">
<meta name="theme-color" content="#0d0b12">
<style>
  :root {
    --bg: #0d0b12;
    --bg-elev: rgba(255,255,255,0.06);
    --text: #f2eee8;
    --text-dim: rgba(242,238,232,0.38);
    --text-mid: rgba(242,238,232,0.60);
    --accent: #e8b04b;
    --accent-soft: rgba(232,176,75,0.14);
    --refrain: rgba(232,176,75,0.75);
    --line-h: 1.55;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  body {
    background:
      radial-gradient(900px 600px at 50% -10%, rgba(232,176,75,0.16), transparent 62%),
      radial-gradient(700px 500px at 50% 105%, rgba(232,176,75,0.07), transparent 60%),
      var(--bg);
    background-attachment: fixed;
    min-height: 100vh;
  }

  /* ---------- Player (sticky) ---------- */
  .player {
    position: sticky;
    top: 0;
    z-index: 20;
    padding: 14px 20px 12px;
    padding-top: max(14px, env(safe-area-inset-top));
    background: rgba(13,11,18,0.74);
    backdrop-filter: saturate(180%) blur(24px);
    -webkit-backdrop-filter: saturate(180%) blur(24px);
    border-bottom: 1px solid rgba(232,176,75,0.14);
  }

  .player-inner {
    max-width: 640px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .cover {
    width: 62px;
    height: 62px;
    flex: 0 0 62px;
    border-radius: 8px;
    object-fit: cover;
    box-shadow:
      0 3px 14px rgba(0,0,0,0.5),
      0 0 0 1px rgba(232,176,75,0.22);
  }

  .meta {
    flex: 1;
    min-width: 0;
  }

  .title {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.01em;
    margin: 0 0 2px;
  }

  .subtitle {
    font-size: 11px;
    color: var(--accent);
    opacity: 0.72;
    margin: 0 0 9px;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    font-weight: 500;
  }

  audio {
    width: 100%;
    height: 32px;
    display: block;
  }

  @media (max-width: 460px) {
    .cover { width: 52px; height: 52px; flex-basis: 52px; }
    .title { font-size: 14px; }
    .player-inner { gap: 12px; }
  }

  /* ---------- Lyrics ---------- */
  .lyrics {
    max-width: 640px;
    margin: 0 auto;
    padding: 44vh 24px 55vh;
  }

  .line {
    font-size: 21px;
    line-height: var(--line-h);
    font-weight: 500;
    color: var(--text-dim);
    padding: 9px 12px;
    margin: 1px -12px;
    border-radius: 12px;
    cursor: pointer;
    transition: color .35s ease, background-color .35s ease, transform .35s cubic-bezier(.22,1,.36,1);
    transform-origin: left center;
    position: relative;
  }

  .line:hover { color: var(--text-mid); }

  .line.refrain {
    font-style: italic;
    font-weight: 600;
  }

  .line.active {
    color: var(--text);
    background: var(--accent-soft);
    transform: scale(1.035);
  }

  .line.active.refrain { color: var(--accent); }

  .line.past { color: var(--text-mid); }

  .line.gap { height: 22px; padding: 0; margin: 0; }

  /* ---------- Edit mode ---------- */
  body.editing .line {
    padding-left: 62px;
  }

  .stamp {
    display: none;
    position: absolute;
    left: 4px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 10px;
    font-variant-numeric: tabular-nums;
    font-weight: 600;
    color: var(--accent);
    background: rgba(232,176,75,0.10);
    border: 1px solid rgba(232,176,75,0.28);
    border-radius: 6px;
    padding: 4px 6px;
    min-width: 50px;
    text-align: center;
  }

  body.editing .stamp { display: block; }
  body.editing .line.gap { display: none; }

  /* ---------- Toolbar ---------- */
  .toolbar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 30;
    display: flex;
    gap: 8px;
    padding: 12px 16px;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
    background: rgba(13,11,18,0.80);
    backdrop-filter: saturate(180%) blur(24px);
    -webkit-backdrop-filter: saturate(180%) blur(24px);
    border-top: 1px solid rgba(255,255,255,0.07);
  }

  button {
    flex: 1;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-mid);
    background: var(--bg-elev);
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 10px;
    padding: 11px 8px;
    cursor: pointer;
    transition: all .2s ease;
  }

  button:hover { color: var(--text); background: rgba(255,255,255,0.10); }

  button.on {
    color: var(--bg);
    background: var(--accent);
    border-color: var(--accent);
  }

  /* Řádek, který je "na řadě" k otagování */
  .line.cue {
    color: var(--text) !important;
    background: rgba(232,176,75,0.10);
    box-shadow: inset 3px 0 0 var(--accent);
    transform: none !important;
  }

  .hint {
    position: fixed;
    bottom: 122px;
    bottom: calc(122px + env(safe-area-inset-bottom));
    left: 50%;
    transform: translateX(-50%);
    z-index: 29;
    font-size: 11px;
    color: var(--text-dim);
    background: rgba(13,11,18,0.92);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 999px;
    padding: 7px 14px;
    white-space: nowrap;
    display: none;
    pointer-events: none;
  }

  body.editing .hint { display: block; }

  /* Velké tlačítko zápisu (jen v editaci) */
  .tapbar {
    display: none;
    position: fixed;
    bottom: 62px;
    bottom: calc(62px + env(safe-area-inset-bottom));
    left: 0;
    right: 0;
    z-index: 28;
    padding: 0 16px 10px;
  }

  body.editing .tapbar { display: block; }

  .tapbar-inner {
    max-width: 640px;
    margin: 0 auto;
    display: flex;
    gap: 8px;
  }

  #btnTap {
    flex: 3;
    font-size: 15px;
    padding: 16px 8px;
    color: var(--bg);
    background: var(--accent);
    border-color: var(--accent);
  }

  #btnTap:disabled {
    opacity: 0.35;
    cursor: default;
  }

  #btnUndo { flex: 1; }

  #out {
    display: none;
    max-width: 640px;
    margin: 0 auto 90px;
    padding: 0 24px;
  }

  #out textarea {
    width: 100%;
    height: 260px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 11px;
    line-height: 1.5;
    color: var(--text-mid);
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 10px;
    padding: 12px;
    resize: vertical;

</head>

  {x:"-"},

  {t:362.5,s:"Kdo jsem? A proč jsem se narodil?"},

/* ---------- Build DOM ---------- */
const audio  = document.getElementById('audio');
const box    = document.getElementById('lyrics');
const nodes  = [];   // { el, t, idx }

L.forEach((row, i) => {
  const el = document.createElement('div');
  if (row.x === '-') {
    el.className = 'line gap';
    box.appendChild(el);
    return;
  }
  el.className = 'line' + (row.x === 'r' ? ' refrain' : '');
  el.dataset.i = i;

  const stamp = document.createElement('span');
  stamp.className = 'stamp';
  stamp.textContent = fmt(row.t);
  el.appendChild(stamp);

  el.appendChild(document.createTextNode(row.s));
  box.appendChild(el);
  nodes.push({ el, i, stamp });
});

function fmt(t) {
  const m = Math.floor(t / 60);
  const s = (t % 60).toFixed(1).padStart(4, '0');
  return `${m}:${s}`;
}

/* ---------- State ---------- */
let follow  = true;
let editing = false;
let current = -1;
let cue     = 0;      // který řádek je "na řadě" k otagování
const undo  = [];     // historie zápisů

const btnFollow = document.getElementById('btnFollow');
const btnEdit   = document.getElementById('btnEdit');
const btnExport = document.getElementById('btnExport');
const btnTap    = document.getElementById('btnTap');
const btnUndo   = document.getElementById('btnUndo');
const hint      = document.getElementById('hint');
const out       = document.getElementById('out');
const outText   = document.getElementById('outText');

/* ---------- Sync loop ---------- */
function tick() {
  const now = audio.currentTime;
  let idx = -1;
  for (let k = 0; k < nodes.length; k++) {
    if (L[nodes[k].i].t <= now) idx = k; else break;
  }
  if (idx !== current) {
    current = idx;
    nodes.forEach((n, k) => {
      // V editaci nezvýrazňujeme "active" — vede to jen cue kurzor.
      n.el.classList.toggle('active', !editing && k === idx);
      n.el.classList.toggle('past',   !editing && k < idx);
    });
    if (follow && !editing && idx >= 0) {
      nodes[idx].el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

/* ---------- Click a line ---------- */
/* Klik na řádek = VŽDY jen skok v audiu. Nikdy nic nepřepíše.
   V editaci navíc nastaví "kurzor" na tento řádek — tedy odkud
   se bude pokračovat v zapisování časů.                        */
box.addEventListener('click', e => {
  const el = e.target.closest('.line');
  if (!el || el.classList.contains('gap')) return;
  const k = nodes.findIndex(n => n.el === el);

  audio.currentTime = L[nodes[k].i].t;
  if (editing) { cue = k; paint(); }
  audio.play();
});

/* Zápis času na "cue" řádek, pak posun kurzoru na další. */
function tap() {
  if (!editing || cue < 0 || cue >= nodes.length) return;
  const i = nodes[cue].i;
  undo.push({ cue, t: L[i].t });        // uložit pro Zpět
  L[i].t = Math.round(audio.currentTime * 10) / 10;
  nodes[cue].stamp.textContent = fmt(L[i].t);
  cue++;
  paint();
  if (cue < nodes.length) {
    nodes[cue].el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

function undoTap() {
  const u = undo.pop();
  if (!u) return;
  const i = nodes[u.cue].i;
  L[i].t = u.t;
  nodes[u.cue].stamp.textContent = fmt(u.t);
  cue = u.cue;
  paint();
  nodes[cue].el.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function paint() {
  nodes.forEach((n, k) => n.el.classList.toggle('cue', editing && k === cue));
  btnTap.disabled = !editing || cue >= nodes.length;
  btnUndo.disabled = undo.length === 0;
  if (editing) {
    hint.textContent = cue >= nodes.length
      ? 'Hotovo — všechny řádky otagovány. Klikni Export.'
      : `Řádek ${cue + 1} / ${nodes.length} — mezerník zapíše čas`;
  }
  current = -2;
}

/* ---------- Buttons ---------- */
btnFollow.onclick = () => {
  follow = !follow;
  btnFollow.classList.toggle('on', follow);
};

btnEdit.onclick = () => {
  editing = !editing;
  document.body.classList.toggle('editing', editing);
  btnEdit.classList.toggle('on', editing);
  if (editing) {
    follow = false;
    btnFollow.classList.remove('on');
    // kurzor začne na řádku, který zrovna hraje (nebo od začátku)
    cue = Math.max(0, current);
    audio.currentTime = L[nodes[cue].i].t;
  } else {
    nodes.forEach(n => n.el.classList.remove('cue'));
  }
  paint();
};

btnTap.onclick  = tap;
btnUndo.onclick = undoTap;

paint();   // výchozí stav tlačítek

btnExport.onclick = () => {
  const lines = L.map(r => {
    if (r.x === '-') return '  {x:"-"},';
    const xa = r.x === 'r' ? ', x:"r"' : '';
    return `  {t:${r.t.toFixed(1)}, s:${JSON.stringify(r.s)}${xa}},`;
  });
  outText.value = 'const L = [\n' + lines.join('\n') + '\n];';
  out.style.display = out.style.display === 'block' ? 'none' : 'block';
  if (out.style.display === 'block') {
    outText.scrollIntoView({ behavior: 'smooth', block: 'center' });
    outText.select();
  }
};

/* ---------- Keyboard ---------- */
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'TEXTAREA') return;

  if (e.code === 'Space') {
    e.preventDefault();
    if (editing) tap();                                   // v editaci = zapsat čas
    else audio.paused ? audio.play() : audio.pause();     // jinak = play/pauza
    return;
  }

  // Zpět: Cmd/Ctrl + Z
  if (e.code === 'KeyZ' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); undoTap(); return; }

  // Play/pauza v editaci: P
  if (e.code === 'KeyP') { e.preventDefault(); audio.paused ? audio.play() : audio.pause(); return; }

  if (e.code === 'ArrowLeft')  { audio.currentTime -= 3; }
  if (e.code === 'ArrowRight') { audio.currentTime += 3; }
  if (e.code === 'ArrowDown')  { e.preventDefault(); if (editing && cue < nodes.length-1) { cue++; paint(); nodes[cue].el.scrollIntoView({behavior:'smooth',block:'center'}); } }
  if (e.code === 'ArrowUp')    { e.preventDefault(); if (editing && cue > 0) { cue--; paint(); nodes[cue].el.scrollIntoView({behavior:'smooth',block:'center'}); } }
});
</script>
</body>
</html>
